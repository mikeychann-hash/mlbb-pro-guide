<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MLBB Pro Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@500;600;700;800&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background-color: #101725;
        background-image: radial-gradient(900px 460px at 50% -16%, rgba(245,197,66,.05), transparent 72%);
        color: #f2f5fa;
        font-family: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 15px;
        line-height: 1.45;
        text-rendering: optimizeLegibility;
      }
      #root { min-height: 100vh; }
      ::selection { background: rgba(240,178,50,.32); color: #fff; }

      *::-webkit-scrollbar { width: 7px; height: 7px; }
      *::-webkit-scrollbar-track { background: transparent; }
      *::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 999px; }
      *::-webkit-scrollbar-thumb:hover { background: #2c3e66; }

      /* App-wide interactive polish — no per-element classes needed */
      button {
        transition: transform .12s ease, background .2s ease, color .2s ease,
                    border-color .2s ease, box-shadow .2s ease, opacity .2s ease;
        -webkit-tap-highlight-color: transparent;
      }
      button:active { transform: scale(.97); }
      button:disabled { opacity: .55; }
      input {
        transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
        -webkit-tap-highlight-color: transparent;
      }
      input:focus {
        border-color: rgba(240,178,50,.65) !important;
        box-shadow: 0 0 0 3px rgba(240,178,50,.13);
        background: rgba(17,26,46,.95) !important;
      }
      input::placeholder { color: #4a5873; }

      /* keyboard accessibility: visible focus ring */
      :focus-visible { outline: 2px solid #f0b232; outline-offset: 2px; border-radius: 6px; }

      @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .view-enter > * { animation: fadeUp .42s cubic-bezier(.22,.61,.36,1) both; }
      .view-enter > *:nth-child(1){animation-delay:.00s}
      .view-enter > *:nth-child(2){animation-delay:.04s}
      .view-enter > *:nth-child(3){animation-delay:.08s}
      .view-enter > *:nth-child(4){animation-delay:.12s}
      .view-enter > *:nth-child(5){animation-delay:.16s}
      .view-enter > *:nth-child(6){animation-delay:.20s}
      .view-enter > *:nth-child(n+7){animation-delay:.24s}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
